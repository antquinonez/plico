# FFClients Model Defaults Configuration
# =======================================
# Default parameters for each AI model. These are used when
# parameters are not explicitly set in the workbook or client config.

model_defaults:
  generic:
    max_tokens: 4096
    temperature: 0.7
    system_instructions: "You are a helpful assistant. Respond accurately to user queries."

  models:
    # Azure-hosted models
    azure/mistral-small-2503:
      max_tokens: 40000
      temperature: 0.7
      system_instructions: "You are a helpful assistant. Respond accurately to user queries. Be concise and clear."

    azure/mistral-large-2411:
      max_tokens: 40000
      temperature: 0.7

    azure/codestral:
      max_tokens: 32000
      temperature: 0.3
      system_instructions: "You are an expert programmer. Write clean, efficient, well-documented code."

    azure/deepseek-v3:
      max_tokens: 32000
      temperature: 0.7

    azure/deepseek-r1:
      max_tokens: 32000
      temperature: 0.7

    azure/phi-4:
      max_tokens: 4096
      temperature: 0.7

    # Mistral Direct API
    mistral/mistral-small-latest:
      max_tokens: 32000
      temperature: 0.7

    mistral/mistral-large-latest:
