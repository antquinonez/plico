# FFClients Main Configuration
# ============================
# Core application settings for workbook processing, orchestration,
# and document handling. Deployment-specific settings are in separate files.

workbook:
  sheet_names:
    config: "config"
    prompts: "prompts"
    data: "data"
    clients: "clients"
    documents: "documents"
  defaults:
    model: "mistral-small-2503"
    api_key_env: "MISTRALSMALL_KEY"
    max_retries: 3
    temperature: 0.8
    max_tokens: 4096
    system_instructions: "You are a helpful assistant. Respond accurately to user queries."
  batch:
    mode: "per_row"
    output: "combined"
    on_error: "continue"

orchestrator:
  default_concurrency: 2
  max_concurrency: 10

document_processor:
  checksum_length: 8
  text_extensions:
    - ".txt"
    - ".md"
    - ".py"
    - ".js"
    - ".html"
    - ".htm"
    - ".css"
    - ".json"
    - ".xml"
    - ".yaml"
    - ".yml"
    - ".ini"
    - ".cfg"
    - ".conf"
    - ".sh"
    - ".bat"
    - ".csv"
    - ".tsv"
    - ".log"
    - ".sql"
    - ".r"
    - ".c"
    - ".cpp"
    - ".h"
    - ".java"
    - ".kt"
    - ".go"
    - ".rs"
    - ".php"
    - ".rb"
    - ".pl"
    - ".swift"

rag:
  enabled: true
  persist_dir: "./chroma_db"
  collection_name: "ffclients_kb"
  embedding_model: "mistral/mistral-embed"
  chunk_size: 1000
  chunk_overlap: 200
  n_results_default: 5
