# FFClients Main Configuration
# ============================
# Core application settings for workbook processing, orchestration,
# and document handling. Deployment-specific settings are in separate files.

workbook:
  sheet_names:
    config: "config"
    prompts: "prompts"
    data: "data"
    clients: "clients"
    documents: "documents"
  defaults:
    model: "mistral-small-2503"
    api_key_env: "MISTRALSMALL_KEY"
    max_retries: 3
    temperature: 0.8
    max_tokens: 4096
    system_instructions: "You are a helpful assistant. Respond accurately to user queries."
  batch:
    mode: "per_row"
    output: "combined"
    on_error: "continue"

orchestrator:
  default_concurrency: 2
  max_concurrency: 10

document_processor:
  checksum_length: 8
  text_extensions:
    - ".txt"
    - ".md"
    - ".py"
    - ".js"
    - ".html"
    - ".htm"
    - ".css"
    - ".json"
    - ".xml"
    - ".yaml"
    - ".yml"
    - ".ini"
    - ".cfg"
    - ".conf"
    - ".sh"
    - ".bat"
    - ".csv"
    - ".tsv"
    - ".log"
    - ".sql"
    - ".r"
    - ".c"
    - ".cpp"
    - ".h"
    - ".java"
    - ".kt"
    - ".go"
    - ".rs"
    - ".php"
    - ".rb"
    - ".pl"
    - ".swift"

rag:
  enabled: true
  persist_dir: "./chroma_db"
  collection_name: "ffclients_kb"
  embedding_model: "mistral/mistral-embed"
  local_embeddings: false
  embedding_cache_size: 256
  generate_summaries: false

  chunking:
    strategy: "recursive"
    chunk_size: 1000
    chunk_overlap: 200
    contextual_headers: true
    dedup_enabled: false
    dedup_mode: "exact"
    markdown:
      split_headers: ["h1", "h2", "h3"]
      preserve_structure: true
      max_chunk_fallback: true
    code:
      language: "python"
      split_by: "function"

  search:
    mode: "vector"
    n_results_default: 5
    hybrid_alpha: 0.6
    rerank: false
    rerank_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    query_expansion: false
    query_expansion_variations: 3
    summary_boost: 1.5

  hierarchical:
    enabled: false
    parent_context: true
    parent_chunk_size: 1500
    levels: 2
