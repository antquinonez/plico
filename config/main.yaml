# FFClients Main Configuration
# ============================
# Core application settings for workbook processing, orchestration,
# and document handling. Deployment-specific settings are in separate files.

workbook:
  sheet_names:
    config: "config"
    prompts: "prompts"
    data: "data"
    clients: "clients"
    documents: "documents"
    tools: "tools"
    scoring: "scoring"
    synthesis: "synthesis"
  defaults:
    model: "mistral-small-2503"
    api_key_env: "MISTRALSMALL_KEY"
    max_retries: 3
    temperature: 0.8
    max_tokens: 32000
    system_instructions: "You are a helpful assistant. Respond accurately to user queries."
  batch:
    mode: "per_row"
    output: "combined"
    on_error: "continue"
  formatting:
    column_widths:
      config:
        field: 22
        value: 60
        notes: 60
      prompts:
        sequence: 10
        prompt_name: 24
        prompt: 60
        history: 40
        client: 12
        condition: 80
        references: 40
        semantic_query: 45
        semantic_filter: 50
        query_expansion: 18
        rerank: 12
      clients:
        name: 14
        client_type: 22
        api_key_env: 18
        model: 28
        temperature: 14
        max_tokens: 14
      documents:
        reference_name: 22
        common_name: 30
        file_path: 55
        tags: 45
        chunking_strategy: 18
        notes: 50
      data: auto
      results:
        batch_id: 10
        batch_name: 15
        sequence: 10
        prompt_name: 18
        prompt: 60
        history: 40
        client: 12
        condition: 60
        condition_result: 18
        condition_error: 30
        response: 60
        status: 12
        attempts: 12
        error: 50
        references: 40
        semantic_query: 45
        semantic_filter: 50
        query_expansion: 18
        rerank: 12
      scoring:
        batch_name: 18
        criteria_name: 22
        normalized_score: 16
        weight: 10
        weighted_score: 15
        rank: 8
        percentile: 12
        scale_min: 10
        scale_max: 10
        description: 50
    word_wrap:
      enabled: true
      columns:
        config:
          - value
          - notes
        prompts:
          - prompt
          - history
          - condition
          - semantic_query
          - semantic_filter
        clients: []
        documents:
          - tags
          - notes
        data: auto
        results:
          - prompt
          - condition
          - response
          - error
          - semantic_query
          - semantic_filter
    rows:
      auto_fit_height: true
      wrap_text_height_multiplier: 15
    features:
      freeze_panes:
        enabled: true
        rows: 1
      auto_filter:
        enabled: true
        all_sheets: true

orchestrator:
  default_concurrency: 2
  max_concurrency: 10
  abort:
    response_default: "-1"

document_processor:
  checksum_length: 8
  text_extensions:
    - ".txt"
    - ".md"
    - ".py"
    - ".js"
    - ".html"
    - ".htm"
    - ".css"
    - ".json"
    - ".xml"
    - ".yaml"
    - ".yml"
    - ".ini"
    - ".cfg"
    - ".conf"
    - ".sh"
    - ".bat"
    - ".csv"
    - ".tsv"
    - ".log"
    - ".sql"
    - ".r"
    - ".c"
    - ".cpp"
    - ".h"
    - ".java"
    - ".kt"
    - ".go"
    - ".rs"
    - ".php"
    - ".rb"
    - ".pl"
    - ".swift"

rag:
  enabled: true
  persist_dir: "./chroma_db"
  collection_name: "plico_kb"
  embedding_model: "mistral/mistral-embed"
  local_embeddings: false
  embedding_cache_size: 256
  generate_summaries: false

  chunking:
    strategy: "recursive"
    chunk_size: 1000
    chunk_overlap: 200
    contextual_headers: true
    dedup_enabled: false
    dedup_mode: "exact"
    markdown:
      split_headers: ["h1", "h2", "h3"]
      preserve_structure: true
      max_chunk_fallback: true
    code:
      language: "python"
      split_by: "function"

  search:
    mode: "vector"
    n_results_default: 5
    hybrid_alpha: 0.6
    rerank: false
    rerank_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    query_expansion: false
    query_expansion_variations: 3
    summary_boost: 1.5

  hierarchical:
    enabled: false
    parent_context: true
    parent_chunk_size: 1500
    levels: 2

agent:
  enabled: true
  max_tool_rounds: 5
  tool_timeout: 30.0
  continue_on_tool_error: true
  validation:
    enabled: true
    max_retries: 2

planning:
  enabled: true
  save_artifacts: false
  generated_sequence_base: "auto"
  generated_sequence_step: 10
  continue_on_parse_error: true

evaluation:
  default_strategy: "balanced"
  scoring_failure_threshold: 0.5
  max_synthesis_context_chars: 30000
  weight_tier_enabled: true
  weight_tier_num_tiers: 3
  weight_tier_prefix: "tier_"
  strategies:
    potential:
      description: "Hire for promise and growth trajectory"
      criteria_overrides:
        education: 2.0
        growth_trajectory: 3.0
        experience_depth: 0.5
    experience:
      description: "Hire for proven track record"
      criteria_overrides:
        experience_depth: 2.5
        employer_prestige: 2.0
        education: 0.5
    balanced:
      description: "Equal weighting across all criteria"

retry:
  max_attempts: 3
  min_wait_seconds: 1
  max_wait_seconds: 60
  exponential_base: 2
  exponential_jitter: true
  retry_on_status_codes:
    - 429
    - 503
    - 502
    - 504
  log_level: "INFO"

observability:
  enabled: false
  otel:
    service_name: "plico"
    endpoint: "http://localhost:4317"
    export_traces: true
    insecure: true
  token_tracking: true
  cost_tracking: true
